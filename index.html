<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Open – Cargar Ticket</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --blue-dark:#1F4E79;--blue-mid:#2E75B6;--blue-light:#D6E4F0;
    --alta:#C00000;--alta-bg:#FFE0E0;--media:#C07000;--media-bg:#FFF5CC;
    --baja:#375623;--baja-bg:#E2EFDA;--gray-50:#F8FAFC;--gray-100:#EFF3F8;
    --gray-200:#D1DCE8;--gray-400:#8FA8C0;--gray-700:#2D3E50;--radius:10px;
  }
  body{font-family:'Inter',sans-serif;background:var(--gray-100);color:var(--gray-700);min-height:100vh;padding:24px 16px 48px}
  header{background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));border-radius:var(--radius);padding:24px 28px;margin-bottom:24px;display:flex;align-items:center;gap:16px;color:white}
  header .logo{font-size:2rem}
  header h1{font-size:1.3rem;font-weight:700}
  header p{font-size:.85rem;opacity:.8;margin-top:2px}
  .card{background:white;border-radius:var(--radius);border:1px solid var(--gray-200);padding:28px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
  .card h2{font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--blue-mid);margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--blue-light)}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:640px){.grid-2{grid-template-columns:1fr}}
  label{display:block;font-size:.78rem;font-weight:600;color:#4A6079;margin-bottom:5px}
  label .req{color:var(--alta);margin-left:2px}
  input,select,textarea{width:100%;border:1.5px solid var(--gray-200);border-radius:7px;padding:10px 12px;font-size:.88rem;font-family:inherit;color:var(--gray-700);background:var(--gray-50);transition:border .15s,box-shadow .15s;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(46,117,182,.12);background:white}
  textarea{resize:vertical;min-height:80px}
  .prio-group{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .prio-option{display:none}
  .prio-label{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:14px 8px;border-radius:8px;border:2px solid var(--gray-200);cursor:pointer;transition:all .15s;text-align:center}
  .prio-label .icon{font-size:1.5rem}
  .prio-label .name{font-size:.82rem;font-weight:700}
  .prio-label .time{font-size:.72rem;opacity:.7}
  .prio-option[value="alta"]:checked+.prio-label{border-color:var(--alta);background:var(--alta-bg);color:var(--alta)}
  .prio-option[value="media"]:checked+.prio-label{border-color:var(--media);background:var(--media-bg);color:var(--media)}
  .prio-option[value="baja"]:checked+.prio-label{border-color:var(--baja);background:var(--baja-bg);color:var(--baja)}
  .prio-label:hover{border-color:var(--blue-mid)}
  .btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));color:white;border:none;border-radius:8px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .15s}
  .btn-submit:hover{opacity:.9}
  .btn-submit:disabled{opacity:.5;cursor:not-allowed}
  .toast{display:none;border-radius:8px;padding:16px 20px;font-size:.9rem;font-weight:500;margin-bottom:20px;border-left:4px solid}
  .toast.ok{background:var(--baja-bg);border-color:#375623;color:#375623;display:block}
  .toast.err{background:var(--alta-bg);border-color:var(--alta);color:var(--alta);display:block}
  .success-box{display:none;background:var(--baja-bg);border:2px solid #375623;border-radius:10px;padding:28px;text-align:center}
  .success-box .check{font-size:3rem;margin-bottom:12px}
  .success-box h3{font-size:1.1rem;font-weight:700;color:#375623;margin-bottom:6px}
  .success-box p{font-size:.88rem;color:#4A6079}
  .success-box .tid-badge{display:inline-block;background:white;border:2px solid #375623;color:#375623;font-weight:700;padding:6px 18px;border-radius:20px;margin:12px 0;font-size:1rem}
  .btn-nuevo{margin-top:14px;padding:10px 24px;background:var(--blue-mid);color:white;border:none;border-radius:7px;font-weight:700;font-family:inherit;cursor:pointer;font-size:.9rem}
  .admin-link{text-align:center;margin-top:8px}
  .admin-link a{font-size:.75rem;color:var(--gray-400);text-decoration:none}
  .admin-link a:hover{color:var(--blue-mid)}
</style>
</head>

};
const CASOS = {
  ZYN: ["Cambiar Razón Social","Cambiar correo","Cambiar carrito / dirección de entrega","Dar de alta nuevo punto","Problema con pedido","Consulta sobre producto ZYN","Otros"],
  CC:  ["Cambiar Razón Social","Cambiar correo","Dar de alta","Problema con facturación","Problema con pago","Cambio de datos del POS","Consulta informativa","Otros"],
};

function updateCasos(){
  const cat=document.getElementById("f-cat").value;
  const sel=document.getElementById("f-caso");
  sel.innerHTML='<option value="">— Seleccioná el caso —</option>';
  if(cat&&CASOS[cat]) CASOS[cat].forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;sel.appendChild(o)});
  else sel.innerHTML='<option value="">— Primero seleccioná una categoría —</option>';
  toggleOtros();
}
function toggleOtros(){
  const caso=document.getElementById("f-caso").value;
  const esOtros=caso==="Otros";
  document.getElementById("otros-wrap").style.display=esOtros?"block":"none";
  document.getElementById("notas-wrap").style.display=(!esOtros&&caso)?"block":"none";
  if(!esOtros) document.getElementById("f-notas").value="";
}

async function submitTicket(){
  const razon=document.getElementById("f-razon").value.trim();
  const posis=document.getElementById("f-posis").value.trim();
  const merch=document.getElementById("f-merch").value.trim();
  const cat=document.getElementById("f-cat").value;
  const caso=document.getElementById("f-caso").value;
  const prioEl=document.querySelector('input[name="prioridad"]:checked');
  const esOtros=caso==="Otros";
  const notasOtros=document.getElementById("f-notas").value.trim();
  const notasExtra=document.getElementById("f-notas-extra").value.trim();

  if(!razon||!merch||!cat||!caso||!prioEl){showToast("Completá todos los campos obligatorios (*).","err");return;}
  if(esOtros&&!notasOtros){showToast("Describí el caso en el campo de texto.","err");return;}

  const btn=document.getElementById("btn-send");
  btn.disabled=true; btn.textContent="Enviando...";

  const prio=prioEl.value;
  const p=PRIO_MAP[prio];
  const fecha=new Date().toLocaleDateString("es-AR");

  try{
    const current=await fetch(BASE_URL+"/latest",{headers:{"X-Master-Key":API_KEY}}).then(r=>r.json());
    const tickets=current.record.tickets||[];
    const lastNum=tickets.length?Math.max(...tickets.map(t=>parseInt(t.id.replace("TKT-",""))||0)):0;
    const id="TKT-"+String(lastNum+1).padStart(3,"0");

    const ticket={
      id, fecha, posis, razon, merch,
      caso: esOtros?`Otros: ${notasOtros}`:caso,
      cat, prioridad:p.label, prioKey:prio,
      estado:"Abierto", responsable:"", relacionados:"",
      cierre:"", tiempo:p.tiempo,
      notas: esOtros?"":notasExtra,
      satisfaccion:""
    };

    tickets.push(ticket);
    await fetch(BASE_URL,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},body:JSON.stringify({tickets})});

    document.getElementById("form-card").style.display="none";
    document.getElementById("success-card").style.display="block";
    document.getElementById("success-tid").textContent=id;
    document.getElementById("success-msg").textContent=`Categoría: ${cat} | ${p.label} | Tiempo de respuesta: ${p.tiempo}`;

  }catch(e){
    showToast("Error al guardar. Intentá de nuevo.","err");
    btn.disabled=false; btn.textContent="Enviar Ticket →";
  }
}

function nuevoTicket(){
  document.getElementById("form-card").style.display="block";
  document.getElementById("success-card").style.display="none";
  ["f-razon","f-posis","f-merch","f-notas","f-notas-extra"].forEach(id=>{const el=document.getElementById(id);if(el)el.value=""});
  document.getElementById("f-cat").value="";
  document.getElementById("f-caso").innerHTML='<option value="">— Primero seleccioná una categoría —</option>';
  document.getElementById("otros-wrap").style.display="none";
  document.getElementById("notas-wrap").style.display="none";
  const c=document.querySelector('input[name="prioridad"]:checked');
  if(c)c.checked=false;
  const btn=document.getElementById("btn-send");
  btn.disabled=false; btn.textContent="Enviar Ticket →";
}

function showToast(msg,type){
  const t=document.getElementById("toast");
  t.textContent=msg; t.className="toast "+type;
  setTimeout(()=>t.className="toast",5000);
}
</script>
