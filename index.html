<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Open – Cargar Ticket</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bd:#1F4E79;--bm:#2E75B6;--bl:#D6E4F0;--alta:#C00000;--abg:#FFE0E0;--med:#C07000;--mbg:#FFF5CC;--baja:#375623;--bbg:#E2EFDA;--g50:#F8FAFC;--g100:#EFF3F8;--g200:#D1DCE8;--g400:#8FA8C0;--g700:#2D3E50;--r:10px}
body{font-family:'Inter',sans-serif;background:var(--g100);color:var(--g700);min-height:100vh;padding:20px 16px 48px}
header{background:linear-gradient(135deg,var(--bd),var(--bm));border-radius:var(--r);padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:14px;color:white}
header img{height:44px;border-radius:6px}
header h1{font-size:1.15rem;font-weight:700}
header p{font-size:.78rem;opacity:.8;margin-top:2px}
.card{background:white;border-radius:var(--r);border:1px solid var(--g200);padding:22px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card h2{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--bm);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--bl)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.g2{grid-template-columns:1fr}}
label{display:block;font-size:.76rem;font-weight:600;color:#4A6079;margin-bottom:4px}
.req{color:var(--alta);margin-left:2px}
input,select,textarea{width:100%;border:1.5px solid var(--g200);border-radius:7px;padding:10px 12px;font-size:.86rem;font-family:inherit;color:var(--g700);background:var(--g50);outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--bm);box-shadow:0 0 0 3px rgba(46,117,182,.1);background:white}
textarea{resize:vertical;min-height:75px}
.prio-group{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
.prio-option{display:none}
.prio-label{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 6px;border-radius:8px;border:2px solid var(--g200);cursor:pointer;transition:all .15s;text-align:center}
.prio-label .icon{font-size:1.4rem}
.prio-label .name{font-size:.8rem;font-weight:700}
.prio-label .time{font-size:.68rem;opacity:.7}
.prio-option[value="alta"]:checked+.prio-label{border-color:var(--alta);background:var(--abg);color:var(--alta)}
.prio-option[value="media"]:checked+.prio-label{border-color:var(--med);background:var(--mbg);color:var(--med)}
.prio-option[value="baja"]:checked+.prio-label{border-color:var(--baja);background:var(--bbg);color:var(--baja)}
.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--bd),var(--bm));color:white;border:none;border-radius:8px;font-size:.95rem;font-weight:700;font-family:inherit;cursor:pointer}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.toast{display:none;border-radius:8px;padding:13px 16px;font-size:.86rem;font-weight:500;margin-bottom:14px;border-left:4px solid}
.toast.ok{background:var(--bbg);border-color:var(--baja);color:var(--baja);display:block}
.toast.err{background:var(--abg);border-color:var(--alta);color:var(--alta);display:block}
.success-box{text-align:center;padding:24px}
.success-box .ck{font-size:2.5rem;margin-bottom:10px}
.success-box h3{font-size:1rem;font-weight:700;color:var(--baja);margin-bottom:6px}
.success-box p{font-size:.84rem;color:#4A6079}
.tid-badge{display:inline-block;background:white;border:2px solid var(--baja);color:var(--baja);font-weight:700;padding:5px 16px;border-radius:20px;margin:10px 0;font-size:.95rem}
.btn-nuevo{margin-top:12px;padding:9px 22px;background:var(--bm);color:white;border:none;border-radius:7px;font-weight:700;font-family:inherit;cursor:pointer;font-size:.85rem}
.footer-links{text-align:center;margin-top:6px;font-size:.72rem;color:var(--g400)}
.footer-links a{color:var(--g400);text-decoration:none;margin:0 8px}
.footer-links a:hover{color:var(--bm)}
</style>
</head>
<body>
<header>
  <img src="logo.jpg" alt="Go Open" onerror="this.style.display='none'">
  <div><h1>Go Open – Cargar Ticket</h1><p>Completá el formulario para registrar un problema o consulta</p></div>
</header>
<div id="toast" class="toast"></div>
<div class="card" id="form-card">
  <h2>📋 Datos del Ticket</h2>
  <div style="margin-bottom:14px"><div class="g2">
    <div><label>Razón Social <span class="req">*</span></label><input id="f-razon" type="text" placeholder="Ej: MAXICUERA SRL"></div>
    <div><label>N° de Cliente (Posis)</label><input id="f-posis" type="text" placeholder="Ej: 000012879500028259"></div>
  </div></div>
  <div class="g2" style="margin-bottom:14px">
    <div><label>Nombre y Apellido <span class="req">*</span></label><input id="f-merch" type="text" placeholder="Ej: Vendedor/Supervisor/Quiosquero"></div>
    <div><label>Categoría <span class="req">*</span></label>
      <select id="f-cat" onchange="updateCasos()">
        <option value="">— Seleccioná —</option>
        <option value="ZYN">ZYN</option>
        <option value="CC">CC</option>
      </select>
    </div>
  </div>
  <div style="margin-bottom:14px">
    <label>Descripción del caso <span class="req">*</span></label>
    <select id="f-caso" onchange="toggleOtros()"><option value="">— Primero seleccioná una categoría —</option></select>
  </div>
  <div id="otros-wrap" style="margin-bottom:14px;display:none">
    <label>Describí el caso <span class="req">*</span></label>
    <textarea id="f-notas" placeholder="Describí el problema con detalle..."></textarea>
  </div>
  <div id="notas-wrap" style="margin-bottom:18px;display:none">
    <label>Notas adicionales <span style="font-weight:400;color:var(--g400)">(opcional)</span></label>
    <input id="f-notas-extra" type="text" placeholder="Información extra">
  </div>
  <div style="margin-bottom:22px">
    <label>Prioridad <span class="req">*</span></label>
    <div class="prio-group">
      <div><input class="prio-option" type="radio" name="prioridad" id="p-alta" value="alta"><label class="prio-label" for="p-alta"><span class="icon">🔴</span><span class="name">Alta</span><span class="time">≤ 2hs</span></label></div>
      <div><input class="prio-option" type="radio" name="prioridad" id="p-media" value="media"><label class="prio-label" for="p-media"><span class="icon">🟡</span><span class="name">Media</span><span class="time">≤ 24hs</span></label></div>
      <div><input class="prio-option" type="radio" name="prioridad" id="p-baja" value="baja"><label class="prio-label" for="p-baja"><span class="icon">🟢</span><span class="name">Baja</span><span class="time">≤ 72hs</span></label></div>
    </div>
  </div>
  <button class="btn-submit" id="btn-send" onclick="submitTicket()">Enviar Ticket →</button>
</div>
<div class="card" id="success-card" style="display:none">
  <div class="success-box">
    <div class="ck">✅</div>
    <h3>¡Ticket registrado!</h3>
    <div class="tid-badge" id="success-tid"></div>
    <p id="success-msg"></p>
    <button class="btn-nuevo" onclick="nuevoTicket()">+ Cargar otro ticket</button>
    <div style="margin-top:10px"><a href="mistickets.html" style="font-size:.78rem;color:var(--bm);text-decoration:none">📌 Ver mis tickets →</a></div>
  </div>
</div>
<div class="footer-links"><a href="mistickets.html">📌 Mis Tickets</a>·<a href="admin.html">🔒 Admin</a></div>

<script>
const BIN_ID="6a2b587bf5f4af5e29e34c19";
const API_KEY="$2a$10$vJ4lx1KLZCKs7V8rLnsqtObyp5IuKl3gwY9km98gDHlXeIxQuypeK";
const BASE_URL=`https://api.jsonbin.io/v3/b/${BIN_ID}`;
const CASOS_COMUNES=["Cambiar Razón Social","Cambiar frecuencia de pedido","Dar de alta","Cambiar correo","Cambiar dirección de entrega","Otros"];
const CASOS={ZYN:CASOS_COMUNES,CC:CASOS_COMUNES};
const PRIO_MAP={alta:{label:"🔴 Alta",tiempo:"2hs"},media:{label:"🟡 Media",tiempo:"24hs"},baja:{label:"🟢 Baja",tiempo:"72hs"}};

function updateCasos(){
  const cat=document.getElementById("f-cat").value;
  const sel=document.getElementById("f-caso");
  sel.innerHTML='<option value="">— Seleccioná el caso —</option>';
  if(cat&&CASOS[cat]) CASOS[cat].forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;sel.appendChild(o)});
  else sel.innerHTML='<option value="">— Primero seleccioná una categoría —</option>';
  toggleOtros();
}
function toggleOtros(){
  const caso=document.getElementById("f-caso").value;
  const esOtros=caso==="Otros";
  document.getElementById("otros-wrap").style.display=esOtros?"block":"none";
  document.getElementById("notas-wrap").style.display=(!esOtros&&caso)?"block":"none";
  if(!esOtros) document.getElementById("f-notas").value="";
}
async function submitTicket(){
  const razon=document.getElementById("f-razon").value.trim();
  const posis=document.getElementById("f-posis").value.trim();
  const merch=document.getElementById("f-merch").value.trim();
  const cat=document.getElementById("f-cat").value;
  const caso=document.getElementById("f-caso").value;
  const prioEl=document.querySelector('input[name="prioridad"]:checked');
  const esOtros=caso==="Otros";
  const notasOtros=document.getElementById("f-notas").value.trim();
  const notasExtra=document.getElementById("f-notas-extra").value.trim();
  if(!razon||!merch||!cat||!caso||!prioEl){showToast("Completá todos los campos obligatorios (*).","err");return;}
  if(esOtros&&!notasOtros){showToast("Describí el caso en el campo de texto.","err");return;}
  const btn=document.getElementById("btn-send");
  btn.disabled=true;btn.textContent="Enviando...";
  const prio=prioEl.value;const p=PRIO_MAP[prio];
  const now=new Date();
  const fecha=now.toLocaleDateString("es-AR");
  const localY=now.getFullYear();
    const localM=String(now.getMonth()+1).padStart(2,"0");
    const localD=String(now.getDate()).padStart(2,"0");
    const fechaISO=`${localY}-${localM}-${localD}`;
  try{
    const res=await fetch(BASE_URL+"/latest",{headers:{"X-Master-Key":API_KEY}});
    const data=await res.json();
    const tickets=data.record.tickets||[];
    const lastNum=tickets.length?Math.max(...tickets.map(t=>parseInt(t.id.replace("TKT-",""))||0)):0;
    const id="TKT-"+String(lastNum+1).padStart(3,"0");
    const ticket={id,fecha,fechaISO,posis,razon,merch,caso:esOtros?`Otros: ${notasOtros}`:caso,cat,prioridad:p.label,prioKey:prio,estado:"Abierto",responsable:"",relacionados:"",cierre:"",tiempo:p.tiempo,notas:esOtros?"":notasExtra,satisfaccion:""};
    tickets.push(ticket);
    await fetch(BASE_URL,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},body:JSON.stringify({tickets})});
    document.getElementById("form-card").style.display="none";
    document.getElementById("success-card").style.display="block";
    document.getElementById("success-tid").textContent=id;
    document.getElementById("success-msg").textContent=`${cat} | ${p.label} | Respuesta en ${p.tiempo}`;
  }catch(e){showToast("Error al guardar. Intentá de nuevo.","err");btn.disabled=false;btn.textContent="Enviar Ticket →";}
}
function nuevoTicket(){
  document.getElementById("form-card").style.display="block";
  document.getElementById("success-card").style.display="none";
  ["f-razon","f-posis","f-merch","f-notas","f-notas-extra"].forEach(id=>{const el=document.getElementById(id);if(el)el.value=""});
  document.getElementById("f-cat").value="";
  document.getElementById("f-caso").innerHTML='<option value="">— Primero seleccioná una categoría —</option>';
  document.getElementById("otros-wrap").style.display="none";
  document.getElementById("notas-wrap").style.display="none";
  const c=document.querySelector('input[name="prioridad"]:checked');if(c)c.checked=false;
  const btn=document.getElementById("btn-send");btn.disabled=false;btn.textContent="Enviar Ticket →";
}
function showToast(msg,type){const t=document.getElementById("toast");t.textContent=msg;t.className="toast "+type;setTimeout(()=>t.className="toast",5000);}
</script>
</body>
</html>
